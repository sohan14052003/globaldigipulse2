<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL DIGI PULSE</title>
    <link rel="stylesheet" href="loginpage.css">
    <link rel="icon" type="image/png" href="../images/icon-7797704_640.JPG">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #ffe066 100%);
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .reset-simple-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px #2e9ad033;
            padding: 32px 24px 24px 24px;
            max-width: 350px;
            width: 100%;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            color: #2e9ad0;
            font-size: 1.7rem;
            margin-bottom: 18px;
            text-align: center;
        }
        .input-box {
            width: 100%;
            margin-bottom: 2px;
            background: none;
            display: flex;
            justify-content: center;
        }
        .input-box input {
            width: 70%;
            min-width: 120px;
            max-width: 200px;
            padding: 10px 12px;
            border: 1px solid #2e9ad0;
            border-radius: 6px;
            font-size: 15px;
            background: #fff;
            text-align: center;
        }
        button {
            background: #2e9ad0;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 12px 0;
            font-size: 17px;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover {
            background: #ff4e50;
        }
        #resetMsg {
            margin-top: 12px;
            color: #ff4e50;
            font-size: 15px;
            text-align: center;
            min-height: 20px;
        }
        @media (max-width: 500px) {
            .reset-simple-container {
                padding: 18px 6px 18px 6px;
                margin-top: 20px;
            }
            h2 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="reset-simple-container">
        <h2>Reset Username & Password</h2>
        <div class="input-box">
            <input type="text" id="newUsername" placeholder="Enter new username">
        </div>
        <div class="input-box">
            <input type="password" id="newPassword" placeholder="Enter new password">
        </div>
        <button id="resetBtn">Reset</button>
        <div id="resetMsg"></div>
    </div>
    <script>
    // Get token from URL
    function getToken() {
        const params = new URLSearchParams(window.location.search);
        return params.get('token');
    }
    document.getElementById('resetBtn').addEventListener('click', async function() {
        const newUsername = document.getElementById('newUsername').value;
        const newPassword = document.getElementById('newPassword').value;
        const resetMsg = document.getElementById('resetMsg');
        const token = getToken();
        if (!newUsername || !newPassword) {
            resetMsg.textContent = 'Please enter a new username and password.';
            return;
        }
        resetMsg.textContent = 'Resetting...';
        try {
            const response = await fetch('https://globaldigipulse.onrender.com/reset-username-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newUsername, newPassword })
            });
            const data = await response.json();
            if (data.success) {
                resetMsg.textContent = 'Reset successful! Use your new username and password to log in.';
                setTimeout(() => {
                    window.location.href = 'LoginPage.html';
                }, 1800);
            } else {
                resetMsg.textContent = data.error || 'Unable to reset.';
            }
        } catch {
            resetMsg.textContent = 'Server error or invalid response.';
        }
    });
    </script>
</body>
</html>

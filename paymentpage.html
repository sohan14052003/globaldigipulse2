<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLOBAL DIGI PULSE</title>
  <link rel="stylesheet" href="../css/app2.css">
  <link rel="icon" type="image/png" href="../images/icon-7797704_640.JPG">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    body { background: linear-gradient(135deg, #b37faa 0%, #3a4a6b 100%); min-height:100vh; }
    .container { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh; }
    .btn { margin-top: 24px; padding: 12px 24px; font-size: 18px; border-radius: 24px; background: #3399cc; color: #fff; border: none; cursor: pointer; }
    @keyframes glow {
      0% { box-shadow: 0 0 16px #f9d423; }
      100% { box-shadow: 0 0 32px #e0e7ff; }
    }
    .btn:hover { background:#2e9ad0 !important; color:#fff !important; }
    @media (max-width:600px) {
      .container > div { max-width:98vw !important; padding:16px !important; }
    }
    .scanpay-card { animation: fadeIn 1s; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(40px);} to { opacity:1; transform:translateY(0);} }
    #scanner-placeholder { animation: glowScanner 2s infinite alternate; }
    @keyframes glowScanner { 0% { box-shadow:0 0 24px #e0e7ff,0 0 8px #f9d423; } 100% { box-shadow:0 0 48px #4db0e1,0 0 16px #eac222; } }
  </style>
</head>
<body>
    <script>
      // Redirect paid users away from ScanAndPay if already paid
      (function() {
        const scanPaid = localStorage.getItem('scanPaid');
        if (scanPaid === 'true') {
          window.location.href = 'IntroPage.html';
        }
      })();
    </script>
    <div class="container" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;">
      <h2 style="font-weight:bold;text-transform:uppercase;font-size:2.6rem;letter-spacing:2px;color:#fff;text-shadow:2px 2px 12px #ff4e50, 0 2px 8px #f9d423;margin-bottom:24px;">Pay to Unlock the Videos</h2>
      <div id="offer-timer" style="font-size:2.1rem;color:#fff;font-weight:700;margin-bottom:18px;text-align:center;">Grab the offer within <span id="timer">07:00</span></div>
      <div class="scanpay-card" style="background:rgba(255,255,255,0.97);box-shadow:0 8px 32px #ff4e50, 0 0 32px #ffe066;border-radius:40px;padding:48px 32px;display:flex;flex-direction:column;align-items:center;max-width:520px;width:100%;margin-bottom:32px;position:relative;overflow:hidden;">
        <div style="position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,#ffe066 60%,#ff4e50 100%);opacity:0.18;border-radius:50%;z-index:0;"></div>
        <div style="position:absolute;bottom:-40px;left:-40px;width:120px;height:120px;background:radial-gradient(circle,#2e9ad0 60%,#b37faa 100%);opacity:0.18;border-radius:50%;z-index:0;"></div>
        <h3 style="font-weight:bold;font-size:2.2rem;color:#ff4e50;text-align:center;margin-bottom:24px;text-shadow:1px 1px 8px #ffe066;z-index:1;">WELCOME TO GLOBAL DIGI PULSE</h3>
        <div style="margin-bottom:18px;z-index:1;">
          <img src="../images/lock.jpg" alt="Lock Icon" style="width:54px;height:54px;box-shadow:0 2px 12px #ffe066;border-radius:50%;background:#fff;">
        </div>
        <div id="upiQrContainer" style="display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;">
          <div style="margin-top:18px;text-align:center;">
            <button id="payBtn" style="background:linear-gradient(90deg,#ff4e50 0%,#ffe066 100%);color:#fff;border:none;border-radius:18px;padding:18px 48px;font-size:22px;font-weight:700;cursor:pointer;box-shadow:0 2px 16px #ffe066,0 2px 8px #ff4e50;letter-spacing:1px;transition:background 0.3s;">Pay ₹999 & Unlock</button>
          </div>
        </div>
        <div style="margin-top:24px;text-align:center;z-index:1;">
          <span style="font-size:18px;color:#2e9ad0;font-weight:600;">100% Secure Payment via Razorpay</span>
        </div>
        <div style="margin-top:12px;text-align:center;z-index:1;">
          <span style="font-size:15px;color:#ff4e50;font-weight:500;">Instant access after payment!</span>
        </div>
      </div>
      <div id="scanResult" style="margin-bottom:16px;font-size:18px;color:#2e9ad0;font-weight:500;"></div>
      <button class="btn" id="goWelcomeBtn" style="display:none;background:#2e9ad0;border-radius:18px;font-size:20px;padding:14px 32px;box-shadow:0 2px 8px #ff4e50;transition:background 0.3s;">Go to Welcome Page</button>
    </div>
    <footer style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;margin-top:24px;">
      <hr style="width:100vw;margin:0 0 10px 0;border:1px solid #ff4e50;">
      <span style="color:#fff;font-size:15px;text-shadow:1px 1px 4px #ff4e50;">ALL RIGHTS RESERVED</span>
    </footer>
    <script src="https://unpkg.com/html5-qrcode@2.3.7/minified/html5-qrcode.min.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      // Enforce backend payment status check on page load
      (async function() {
        try {
          const res = await fetch('/user-access-status', { credentials: 'include' });
          if (res.ok) {
            const status = await res.json();
            if (status.scanPaid) {
              localStorage.setItem('scanPaid', 'true');
              window.location.href = 'IntroPage.html';
              return;
            } else {
              localStorage.removeItem('scanPaid');
            }
          }
        } catch (e) {
          // Optionally show error or fallback
        }
      })();
      let scanned = false;
      const goWelcomeBtn = document.createElement('button');
      goWelcomeBtn.className = 'btn';
      goWelcomeBtn.textContent = 'Go to Welcome Page';
      goWelcomeBtn.style.display = 'none';
      document.querySelector('.container').appendChild(goWelcomeBtn);
      goWelcomeBtn.onclick = function() {
        window.location.href = "BusinessAccount.html";
      };
      // Disable payment button if already paid
      const scanPaid = localStorage.getItem('scanPaid') === 'true';
      const scanPayBtn = document.getElementById('payBtn');
      if (scanPaid && scanPayBtn) {
        scanPayBtn.textContent = 'Already Paid';
        scanPayBtn.disabled = true;
        scanPayBtn.style.opacity = '0.6';
      }
      // Razorpay ₹1000 payment button (UPI enforced)
      document.getElementById("payBtn").addEventListener("click", function() {
        const userId = localStorage.getItem('userId');
        const email = localStorage.getItem('email') || '';
        const name = localStorage.getItem('name') || '';
        fetch("/create-order", {
          method: "POST",
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, amount: 99900, purpose: 'scan' }) // ₹999 in paise
        })
          .then(res => res.json())
          .then(order => {
            if (order && order.id) {
              const options = {
                key: 'rzp_live_SgVjOOUUHbzBIS', // Razorpay live key
                amount: order.amount,
                currency: order.currency,
                name: 'GLOBAL DIGI PULSE',
                description: 'Access Program',
                order_id: order.id,
                handler: function (response) {
                  // Verify payment on backend before redirect
                  fetch('/verify-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      razorpay_payment_id: response.razorpay_payment_id,
                      razorpay_order_id: response.razorpay_order_id,
                      razorpay_signature: response.razorpay_signature,
                      userId: userId
                    })
                  })
                    .then(res => res.json())
                    .then(data => {
                      if (data.success) {
                        localStorage.setItem('scanPaid', 'true');
                        window.location.href = 'IntroPage.html';
                      } else {
                        alert('Payment verification failed. Please contact support.');
                      }
                    })
                    .catch(() => {
                      alert('Server error during payment verification.');
                    });
                },
                prefill: {
                  name: name,
                  email: email
                },
                theme: {
                  color: '#ff4e50'
                },
                modal: {
                  ondismiss: function() {
                    // Optionally handle modal close
                  }
                }
              };
              const rzp = new Razorpay(options);
              rzp.open();
            } else {
              alert('Failed to create order.');
            }
          })
          .catch(() => {
            alert('Server error.');
          });
      });
      // 7-minute countdown timer logic
      (function() {
        const timerDisplay = document.getElementById('timer');
        // Do not disable the pay button when timer ends
        let timeLeft = 7 * 60; // 7 minutes in seconds
        let timerInterval = setInterval(function() {
          let min = Math.floor(timeLeft / 60);
          let sec = timeLeft % 60;
          timerDisplay.textContent = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            document.getElementById('offer-timer').textContent = 'Offer expired. Please refresh the page to try again or proceed to pay.';
            // Do NOT disable or change the pay button
          }
          timeLeft--;
        }, 1000);
      })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GLOBAL DIGI PULSE</title>
    <link rel="stylesheet" href="loginpage.css">
    <style>
        body {
            background: #f7f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            background: #fff;
            padding: 36px 28px 30px 28px;
            border-radius: 20px;
            box-shadow: 0 4px 18px #2e9ad033, 0 0 18px #ffe06633;
            max-width: 350px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .register-container h2 {
            color: #2e9ad0;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 18px;
        }
        .register-container form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .register-container input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #2e9ad0;
            border-radius: 12px;
        }
        .register-container button[type="submit"] {
            padding: 12px 0;
            font-size: 18px;
            background: #2e9ad0;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            box-shadow: 0 2px 8px #ffe066;
            transition: background 0.3s;
        }
        .register-container button[type="submit"]:hover {
            background: #232946;
        }
        .register-message {
            margin-top: 16px;
            color: #ff4e50;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            min-height: 24px;
        }
        .back-link {
            margin-top: 18px;
            color: #2e9ad0;
            text-decoration: underline;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Create Account</h2>
        <form id="registerForm" autocomplete="off">
            <input type="text" id="registerUsername" name="username" placeholder="Username" required>
            <input type="email" id="registerEmail" name="email" placeholder="Email" required>
            <input type="password" id="registerPassword" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <div class="register-message" id="registerMessage"></div>
        <div class="back-link" onclick="window.location.href='loginpage.html'">&larr; Back to Login</div>
    </div>
    <script>
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const username = document.getElementById("registerUsername").value;
        const email = document.getElementById("registerEmail").value;
        const password = document.getElementById("registerPassword").value;
        const msgDiv = document.getElementById("registerMessage");
        msgDiv.style.color = "#2e9ad0";
        msgDiv.textContent = "Registering...";
        try {
            const res = await fetch("https://globaldigipulse.onrender.com/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();
            if (data.success) {
                msgDiv.style.color = "#2e9ad0";
                msgDiv.textContent = "Registration successful! Redirecting to login...";
                setTimeout(() => {
                    window.location.href = "loginpage.html";
                }, 1500);
            } else {
                msgDiv.style.color = "#ff4e50";
                msgDiv.textContent = data.message || "Registration failed.";
            }
        } catch (err) {
            msgDiv.style.color = "#ff4e50";
            msgDiv.textContent = "Server error. Please try again.";
        }
    });
    </script>
</body>
</html>

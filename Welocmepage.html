<script>
const stripe = Stripe('YOUR_LIVE_STRIPE_PUBLISHABLE_KEY'); // <-- Replace with your real Stripe publishable key

document.getElementById('payBtn') && (document.getElementById('payBtn').onclick = async () => {
  const res = await fetch('https://your-backend.onrender.com/create-checkout-session', { method: 'POST' });
  const { id } = await res.json();
  stripe.redirectToCheckout({ sessionId: id });
});

document.getElementById('showQRBtn') && (document.getElementById('showQRBtn').onclick = async () => {
  const qrRes = await fetch('https://your-backend.onrender.com/payment-qr');
  const qrHtml = await qrRes.text();
  document.getElementById('qrContainer').innerHTML = qrHtml;
});

// Razorpay payment integration
const razorpayBtn = document.getElementById('razorpayBtn');
if (razorpayBtn) {
  razorpayBtn.onclick = async function() {
    try {
      const res = await fetch('https://your-backend.onrender.com/create-razorpay-order', { method: 'POST' });
      const order = await res.json();
      if (order && order.id) {
        const options = {
          key: 'rzp_test_SYaEMm8lCBf27', // <-- Razorpay Test Key ID
          amount: order.amount,
          currency: order.currency,
          name: 'Educate And Learn',
          description: 'Program Payment',
          order_id: order.id,
          handler: function(response) {
            // Redirect to intro page after payment
            window.location.href = 'IntroPage.html';
          },
          prefill: {
            name: '',
            email: '',
            contact: ''
          },
          theme: {
            color: '#3399cc'
          }
        };
        const rzp = new Razorpay(options);
        rzp.open();
      } else {
        alert('Failed to create Razorpay order.');
      }
    } catch (err) {
      alert('Error: ' + err.message);
    }
  };
}
</script>
